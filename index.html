<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrimonio — Gestión Inmobiliaria</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><polygon points='40,6 8,28 72,28' fill='%23c9a84c'/><rect x='14' y='27' width='52' height='8' fill='%23a8873d'/><text x='40' y='66' text-anchor='middle' font-family='serif' font-size='46' font-weight='900' fill='%23c9a84c'>%24</text><rect x='6' y='70' width='68' height='8' rx='2' fill='%23c9a84c'/><rect x='0' y='76' width='80' height='5' rx='1' fill='%23a8873d'/></svg>" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0e10; --surface: #16181c; --surface-raised: #1e2026;
      --border: #2a2d35; --text: #e8eaed; --text-muted: #6b7280;
      --gold: #c9a84c; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.6); }
    select option { background:#1e2026; }
    .prop-checkbox-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; border:1px solid var(--border); border-radius:6px; padding:8px; background:var(--surface-raised); }
    .prop-checkbox-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:5px; cursor:pointer; transition:background 0.1s; }
    .prop-checkbox-item:hover { background:rgba(201,168,76,0.08); }
    .prop-checkbox-item input[type=checkbox] { accent-color:var(--gold); width:16px; height:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const uid = () => Math.random().toString(36).slice(2, 10);
    const fmtUSD = (n) => (n == null || n === "") ? "—" : `USD ${Number(n).toLocaleString("es-AR")}`;
    const fmtARS = (n) => (n == null || n === "") ? "—" : `$ ${Number(n).toLocaleString("es-AR")}`;
    const today = () => new Date().toISOString().slice(0, 10);
    const monthLabel = (d) => { if (!d) return "—"; const [y,m] = d.split("-"); return `${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][+m-1]} ${y}`; };
    const addMonths = (ds, n) => { const d = new Date(ds+"-01"); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,7); };
    const currentMonth = () => new Date().toISOString().slice(0,7);

    // Helpers para bundles — contrato tiene propiedad_ids (array) o propiedad_id (legacy)
    const getPropIds = (c) => c.propiedad_ids || (c.propiedad_id ? [c.propiedad_id] : []);
    const isBundle = (c) => getPropIds(c).length > 1;
    const propLabel = (p) => p ? `${p.direccion}${p.piso ? " P."+p.piso : ""}${p.unidad ? " U."+p.unidad : ""}` : "—";
    const bundleLabel = (c, propiedades) => {
      const ids = getPropIds(c);
      if (ids.length === 0) return "Sin propiedad";
      if (ids.length === 1) return propLabel(propiedades.find(p => p.id === ids[0]));
      const names = ids.map(id => { const p = propiedades.find(x => x.id === id); return p ? (p.unidad || p.tipologia) : "?"; });
      const first = propLabel(propiedades.find(p => p.id === ids[0]));
      return `${first} + ${names.slice(1).join(" + ")}`;
    };

    const fmtMonto = (monto, moneda) => {
      if (monto == null || monto === "") return "—";
      const n = Number(monto).toLocaleString("es-AR");
      return moneda === "USD" ? `USD ${n}` : `$ ${n}`;
    };
    const TIPOLOGIAS = ["Monoambiente","2 Ambientes","3 Ambientes","4 Ambientes","5+ Ambientes","Casa","Cochera","Local Comercial","Otro"];
    const TIPOS_PROPIEDAD = ["Departamento","Casa","Cochera","Local","Terreno","Otro"];
    const INDICES = ["ICL","IPC","CVS","Libre","Otro"];
    const MEDIOS_PAGO = ["Transferencia","Efectivo","Cheque","Otro"];
    const TIPOS_GASTO = ["Expensas","ARBA","ABL / Municipal","Agua","Luz","Gas","Reparacion","Honorario Inmobiliaria","Seguros","Otro"];

    // ── GOOGLE CONFIG ──────────────────────────────────────────────────────────
    const GCONFIG = {
      clientId: "60113807108-poko7kjo1nlrdjf153h2regaj6o15fpo.apps.googleusercontent.com",
      spreadsheetId: "1lSOJxnA32hxkN3UT_BRnzpJ8L8mD_HRvSWHvKEOsTK0",
      scopes: "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file",
      driveFolderName: "Patrimonio Imagenes",
    };

    // ── TOKEN MANAGEMENT ───────────────────────────────────────────────────────
    let gAccessToken = localStorage.getItem("g_access_token") || null;
    let gTokenExpiry = +localStorage.getItem("g_token_expiry") || 0;
    const isTokenValid = () => gAccessToken && Date.now() < gTokenExpiry - 60000;
    const saveToken = (token, expiresIn) => {
      gAccessToken = token;
      gTokenExpiry = Date.now() + expiresIn * 1000;
      localStorage.setItem("g_access_token", token);
      localStorage.setItem("g_token_expiry", String(gTokenExpiry));
    };
    const clearToken = () => {
      gAccessToken = null; gTokenExpiry = 0;
      localStorage.removeItem("g_access_token");
      localStorage.removeItem("g_token_expiry");
    };

    // ── OAUTH ──────────────────────────────────────────────────────────────────
    const doOAuthLogin = () => new Promise((resolve, reject) => {
      const redirectUri = window.location.href.split("?")[0].split("#")[0];
      const params = new URLSearchParams({
        client_id: GCONFIG.clientId,
        redirect_uri: redirectUri,
        response_type: "token",
        scope: GCONFIG.scopes,
        prompt: "consent",
      });
      const popup = window.open(`https://accounts.google.com/o/oauth2/v2/auth?${params}`, "oauth", "width=500,height=650,left=200,top=100");
      if (!popup) { reject(new Error("Popup bloqueado. Permitir popups para este archivo.")); return; }
      const interval = setInterval(() => {
        try {
          if (popup.closed) { clearInterval(interval); reject(new Error("Login cancelado")); return; }
          const hash = popup.location.hash;
          if (hash && hash.includes("access_token")) {
            clearInterval(interval); popup.close();
            const p = new URLSearchParams(hash.slice(1));
            const token = p.get("access_token");
            const expiresIn = +(p.get("expires_in") || 3600);
            saveToken(token, expiresIn);
            resolve(token);
          }
        } catch(e) { /* cross-origin while loading, keep waiting */ }
      }, 400);
    });

    const getToken = async () => {
      if (isTokenValid()) return gAccessToken;
      return await doOAuthLogin();
    };

    // ── SHEETS SCHEMA ──────────────────────────────────────────────────────────
    const SHEET_COLS = {
      Propiedades: ["id","tipo","tipologia","direccion","piso","unidad","edificio","m2","partida_municipal","nomenclatura_catastral","id_arba","valor_compra","fecha_compra","valor_m2","estado","destino","fecha_fin_construccion","valor_venta","fecha_venta","notas"],
      Inquilinos:  ["id","nombre","cuil","telefono","email","garante_nombre","garante_cuil","garante_telefono","notas"],
      Contratos:   ["id","propiedad_ids","inquilino_id","fecha_inicio","fecha_fin","monto_inicial","moneda_cuota","deposito","moneda_deposito","indice","periodicidad_meses","sin_actualizacion","notas","adjunto"],
      Pagos:       ["id","contrato_id","periodo","monto_esperado","monto_pagado","moneda","fecha_pago","medio","comprobante","notas"],
      Gastos:      ["id","propiedad_id","tipo","monto","fecha","estado","notas","comprobante"],
    };

    const rowToObj = (cols, row) => {
      const obj = {};
      cols.forEach((col, i) => {
        let val = row[i] ?? "";
        if (col === "propiedad_ids") { try { val = JSON.parse(val); } catch { val = val ? [val] : []; } }
        if (col === "sin_actualizacion") val = val === "true" || val === true;
        if (col === "periodicidad_meses" && val !== "") val = +val;
        obj[col] = val;
      });
      return obj;
    };

    const objToRow = (cols, obj) => cols.map(col => {
      const v = obj[col];
      if (col === "propiedad_ids") return JSON.stringify(v || []);
      if (v == null) return "";
      return String(v);
    });

    // ── SHEETS API CALLS ───────────────────────────────────────────────────────
    const sheetsRead = async (sheet) => {
      const token = await getToken();
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${sheet}`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error(`Error leyendo ${sheet}: ${res.status}`);
      const data = await res.json();
      const rows = data.values || [];
      if (rows.length <= 1) return [];
      const cols = SHEET_COLS[sheet];
      return rows.slice(1).map(row => rowToObj(cols, row)).filter(r => r.id);
    };

    const sheetsEnsureHeader = async (sheet, token) => {
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${sheet}!A1`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!data.values) {
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${sheet}!A1:append?valueInputOption=RAW`, {
          method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ values: [SHEET_COLS[sheet]] })
        });
      }
    };

    const sheetsFindRowNum = async (sheet, id, token) => {
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${sheet}!A:A`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const rows = data.values || [];
      for (let i = 1; i < rows.length; i++) { if (rows[i][0] === id) return i + 1; }
      return null;
    };

    const sheetsSave = async (sheet, obj) => {
      const token = await getToken();
      await sheetsEnsureHeader(sheet, token);
      const cols = SHEET_COLS[sheet];
      const row = objToRow(cols, obj);
      const rowNum = await sheetsFindRowNum(sheet, obj.id, token);
      if (rowNum) {
        const range = `${sheet}!A${rowNum}:${String.fromCharCode(64+cols.length)}${rowNum}`;
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${range}?valueInputOption=RAW`, {
          method: "PUT", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ values: [row] })
        });
      } else {
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GCONFIG.spreadsheetId}/values/${sheet}!A1:append?valueInputOption=RAW`, {
          method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ values: [row] })
        });
      }
    };

    // ── DRIVE IMAGE UPLOAD ─────────────────────────────────────────────────────
    let gDriveFolderId = localStorage.getItem("g_drive_folder_id") || null;

    const getOrCreateFolder = async (token) => {
      if (gDriveFolderId) return gDriveFolderId;
      const q = encodeURIComponent(`name='${GCONFIG.driveFolderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
      const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`, { headers: { Authorization: `Bearer ${token}` } });
      const sd = await search.json();
      if (sd.files && sd.files.length > 0) {
        gDriveFolderId = sd.files[0].id;
      } else {
        const create = await fetch("https://www.googleapis.com/drive/v3/files", {
          method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ name: GCONFIG.driveFolderName, mimeType: "application/vnd.google-apps.folder" })
        });
        const cd = await create.json();
        gDriveFolderId = cd.id;
      }
      localStorage.setItem("g_drive_folder_id", gDriveFolderId);
      return gDriveFolderId;
    };

    const uploadToDrive = async (base64Data, filename) => {
      if (!base64Data || !base64Data.startsWith("data:")) return base64Data;
      try {
        const token = await getToken();
        const folderId = await getOrCreateFolder(token);
        const [meta, b64] = base64Data.split(",");
        const mime = meta.match(/:(.*?);/)[1];
        const binary = atob(b64);
        const arr = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
        const blob = new Blob([arr], { type: mime });
        const form = new FormData();
        form.append("metadata", new Blob([JSON.stringify({ name: filename, parents: [folderId] })], { type: "application/json" }));
        form.append("file", blob);
        const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink", {
          method: "POST", headers: { Authorization: `Bearer ${token}` }, body: form
        });
        const d = await res.json();
        return d.webViewLink || base64Data;
      } catch(e) {
        console.warn("Error subiendo a Drive:", e);
        return base64Data;
      }
    };

    const processImages = async (obj, entityType) => {
      const processed = {...obj};
      for (const field of ["comprobante","adjunto"]) {
        if (processed[field] && processed[field].startsWith("data:")) {
          const ext = processed[field].includes("png") ? "png" : "jpg";
          processed[field] = await uploadToDrive(processed[field], `${entityType}_${obj.id}_${field}_${Date.now()}.${ext}`);
        }
      }
      return processed;
    };

    // ── LOCAL CACHE ────────────────────────────────────────────────────────────
    const KEYS = { propiedades:"pat_propiedades", inquilinos:"pat_inquilinos", contratos:"pat_contratos", pagos:"pat_pagos", gastos:"pat_gastos" };
    const loadLocal = (k) => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } };
    const saveLocal = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    const syncAll = async () => {
      const [propiedades, inquilinos, contratos, pagos, gastos] = await Promise.all([
        sheetsRead("Propiedades"), sheetsRead("Inquilinos"), sheetsRead("Contratos"), sheetsRead("Pagos"), sheetsRead("Gastos")
      ]);
      saveLocal(KEYS.propiedades, propiedades); saveLocal(KEYS.inquilinos, inquilinos);
      saveLocal(KEYS.contratos, contratos); saveLocal(KEYS.pagos, pagos); saveLocal(KEYS.gastos, gastos);
      return { propiedades, inquilinos, contratos, pagos, gastos };
    };

    const seedIfEmpty = () => {
      if (loadLocal(KEYS.propiedades).length > 0) return;
      const props = [
        // ── MACHADO 3350 ──────────────────────────────────────────────────────
        { id:"mac1", tipo:"Casa", tipologia:"Casa", direccion:"Machado 3350", piso:"", unidad:"Grande", edificio:"", m2:"", partida_municipal:"", nomenclatura_catastral:"", id_arba:"101-220845", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"Unidad principal del bundle Machado" },
        { id:"mac2", tipo:"Casa", tipologia:"Casa", direccion:"Machado 3350", piso:"", unidad:"Chico 1", edificio:"", m2:"", partida_municipal:"", nomenclatura_catastral:"", id_arba:"101-220847", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"Parte del bundle Machado" },
        { id:"mac3", tipo:"Casa", tipologia:"Casa", direccion:"Machado 3350", piso:"", unidad:"Chico 2", edificio:"", m2:"", partida_municipal:"", nomenclatura_catastral:"", id_arba:"101-220849", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"Parte del bundle Machado" },
        // ── GABOTO 952 ────────────────────────────────────────────────────────
        { id:"gab1", tipo:"Casa", tipologia:"Casa", direccion:"Gaboto 952", piso:"", unidad:"", edificio:"", m2:"", partida_municipal:"", nomenclatura_catastral:"", id_arba:"135-058944-5", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"uso_propio", notas:"Casa propia" },
        // ── ALVEAR 958 ────────────────────────────────────────────────────────
        { id:"alv1", tipo:"Departamento", tipologia:"Otro", direccion:"Alvear 958", piso:"4", unidad:"409", edificio:"", m2:"", partida_municipal:"405819", nomenclatura_catastral:"", id_arba:"136-068444-6", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"" },
        { id:"alv2", tipo:"Cochera", tipologia:"Cochera", direccion:"Alvear 958", piso:"", unidad:"Cochera 25", edificio:"", m2:"", partida_municipal:"", nomenclatura_catastral:"", id_arba:"136-068391-1", valor_compra:"", fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"Bundle con Dpto 409" },

        { id:"orq2f", tipo:"Departamento", tipologia:"Otro", direccion:"Orquideas", piso:"2", unidad:"2F", edificio:"Orquideas", m2:"", partida_municipal:"409003", nomenclatura_catastral:"UF18", id_arba:"136-70524", valor_compra:19113776, fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"" },
        { id:"orq4f", tipo:"Departamento", tipologia:"Otro", direccion:"Orquideas", piso:"4", unidad:"4F", edificio:"Orquideas", m2:"", partida_municipal:"409019", nomenclatura_catastral:"UF34", id_arba:"136-70540", valor_compra:18462170, fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"" },
        { id:"orq5a", tipo:"Departamento", tipologia:"Otro", direccion:"Orquideas", piso:"5", unidad:"5A", edificio:"Orquideas", m2:"", partida_municipal:"409002", nomenclatura_catastral:"UF36", id_arba:"136-70542", valor_compra:28779265, fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"" },
        { id:"orq5c", tipo:"Departamento", tipologia:"Otro", direccion:"Orquideas", piso:"5", unidad:"5C", edificio:"Orquideas", m2:"", partida_municipal:"409023", nomenclatura_catastral:"UF38", id_arba:"136-70544", valor_compra:21720200, fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"Sin alquilar actualmente" },
        // ── ORQUIDEAS — COCHERAS ──────────────────────────────────────────────
        { id:"coch2",  tipo:"Cochera", tipologia:"Cochera", direccion:"Orquideas", piso:"", unidad:"Cochera 2",  edificio:"Orquideas", m2:"", partida_municipal:"409069", nomenclatura_catastral:"UF51 - UC AI", id_arba:"136-70590", valor_compra:108601,   fecha_compra:"", valor_m2:"", estado:"activa", destino:"alquiler", notas:"" },

      if (name==="contract") return <svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>;

      if (name==="edit") return <svg {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
      if (name==="alert") return <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
      if (name==="x") return <svg {...p} strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
      if (name==="chevron") return <svg {...p} strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>;
      if (name==="back") return <svg {...p} strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>;
      if (name==="home") return <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

      if (name==="trash") return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>;

    // ── UI PRIMITIVES ──────────────────────────────────────────────────────────
    const Modal = ({ title, onClose, children, wide }) => (
      <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16, backdropFilter:"blur(4px)" }}>

    const Field = ({ label, children, half, third }) => (
      <div style={{ marginBottom:16, flex: third?"1 1 30%":half?"1 1 45%":"1 1 100%" }}>

    const Input = ({ style, ...props }) => <input {...props} style={{ ...iStyle, ...style }} />;
    const Select = ({ children, style, ...props }) => <select {...props} style={{ ...iStyle, ...style }}>{children}</select>;
    const Textarea = ({ style, ...props }) => <textarea {...props} rows={3} style={{ ...iStyle, resize:"vertical", ...style }} />;
    const FormRow = ({ children }) => <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>{children}</div>;

    const Badge = ({ label, color }) => {
      const m = { green:["rgba(52,211,153,0.12)","#34d399","rgba(52,211,153,0.25)"], orange:["rgba(251,146,60,0.12)","#fb923c","rgba(251,146,60,0.25)"], red:["rgba(248,113,113,0.12)","#f87171","rgba(248,113,113,0.25)"], blue:["rgba(96,165,250,0.12)","#60a5fa","rgba(96,165,250,0.25)"], gold:["rgba(201,168,76,0.12)","var(--gold)","rgba(201,168,76,0.25)"], purple:["rgba(167,139,250,0.12)","#a78bfa","rgba(167,139,250,0.25)"], muted:["rgba(148,163,184,0.1)","var(--text-muted)","rgba(148,163,184,0.2)"] };
      const [bg,text,border] = m[color]||m.muted;
      return <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase", background:bg, color:text, border:`1px solid ${border}` }}>{label}</span>;
    };

    const StatCard = ({ label, value, sub, color, icon }) => (
      <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"20px 24px", flex:"1 1 180px", minWidth:160 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
          <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>{label}</span>
          <span style={{ color:color||"var(--gold)", opacity:0.7 }}><Icon name={icon} size={16}/></span>

        {sub && <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:6 }}>{sub}</div>}
      </div>
    );

    const getHitos = (c) => {
      if (c.sin_actualizacion) return [];
      if (!c.fecha_inicio || !c.periodicidad_meses) return [];
      const hitos = []; let m = addMonths(c.fecha_inicio.slice(0,7), c.periodicidad_meses);
      const fin = c.fecha_fin ? c.fecha_fin.slice(0,7) : addMonths(c.fecha_inicio.slice(0,7), 36);
      while (m <= fin) { hitos.push(m); m = addMonths(m, c.periodicidad_meses); }
      return hitos;
    };

    // ── BUNDLE TAG ─────────────────────────────────────────────────────────────
    // Shows a small "bundle" pill with linked property names
    function BundleTag({ contrato, propiedades, currentPropId }) {
      const ids = getPropIds(contrato);
      if (ids.length <= 1) return null;
      const others = ids.filter(id => id !== currentPropId).map(id => propiedades.find(p => p.id === id)).filter(Boolean);
      if (others.length === 0) return null;
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4, fontSize:11, color:"#a78bfa", background:"rgba(167,139,250,0.1)", border:"1px solid rgba(167,139,250,0.25)", borderRadius:12, padding:"2px 8px", fontWeight:600 }}>
          <Icon name="link" size={11}/>
          junto con {others.map(p => p.unidad || p.tipologia).join(", ")}
        </span>
      );
    }

    // ── MULTI-PROP SELECTOR ────────────────────────────────────────────────────
    function PropiedadMultiSelector({ propiedades, selectedIds, onChange }) {
      const alquilables = propiedades.filter(p => p.estado === "activa" && p.destino === "alquiler");
      const toggle = (id) => {
        if (selectedIds.includes(id)) onChange(selectedIds.filter(x => x !== id));
        else onChange([...selectedIds, id]);
      };
      return (
        <div className="prop-checkbox-list">
          {alquilables.length === 0 && <div style={{ fontSize:13, color:"var(--text-muted)", padding:8 }}>No hay propiedades disponibles para alquiler</div>}
          {alquilables.map(p => (
            <label key={p.id} className="prop-checkbox-item">
              <input type="checkbox" checked={selectedIds.includes(p.id)} onChange={() => toggle(p.id)} />
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600 }}>{propLabel(p)}</div>
                <div style={{ fontSize:11, color:"var(--text-muted)" }}>{p.tipologia}{p.m2 ? ` · ${p.m2} m2` : ""}{p.edificio ? ` · ${p.edificio}` : ""}</div>
              </div>
            </label>
          ))}
        </div>
      );
    }

    // Reusable currency amount input: amount field + ARS/USD toggle side by side
    function MontoConMoneda({ labelMonto, labelMoneda, monto, moneda, onMonto, onMoneda }) {
      const toggleStyle = (active) => ({
        padding:"6px 14px", border:"1px solid var(--border)", background: active?"var(--gold)":"var(--surface-raised)",
        color: active?"#0a0a0a":"var(--text-muted)", cursor:"pointer", fontSize:13, fontWeight: active?700:400,
        transition:"all 0.15s"
      });
      return (
        <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
          <div style={{ flex:1 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:6 }}>{labelMonto}</label>
            <Input type="number" value={monto} onChange={e=>onMonto(e.target.value)} placeholder="0"/>
          </div>
          <div style={{ paddingBottom:1 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:6 }}>{labelMoneda}</label>
            <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"1px solid var(--border)" }}>
              <button type="button" onClick={()=>onMoneda("ARS")} style={{ ...toggleStyle(moneda==="ARS"), borderRadius:0, borderRight:"1px solid var(--border)" }}>ARS</button>
              <button type="button" onClick={()=>onMoneda("USD")} style={{ ...toggleStyle(moneda==="USD"), borderRadius:0 }}>USD</button>
            </div>

    // ── VIEWS ──────────────────────────────────────────────────────────────────
    function Dashboard({ propiedades, contratos, pagos, gastos, inquilinos, onNav }) {
      const cm = currentMonth();
      const activas = propiedades.filter(p=>p.estado==="activa");
      const paraAlquiler = activas.filter(p=>p.destino==="alquiler");
      // A prop is alquilada if any vigent contract includes it
      const alquiladas = paraAlquiler.filter(p=>contratos.some(c=>getPropIds(c).includes(p.id)&&c.fecha_fin>=cm+"-01"));
      const vacantes = paraAlquiler.filter(p=>!contratos.some(c=>getPropIds(c).includes(p.id)&&c.fecha_fin>=cm+"-01"));
      const enConstr = propiedades.filter(p=>p.estado==="construccion");
      const vigentes = contratos.filter(c=>c.fecha_fin>=cm+"-01");
      const pm = addMonths(cm, -1); // mes pasado

      // Cobros mes actual — separados por moneda
      const pagosM = pagos.filter(p=>p.periodo===cm);
      const cobradoARS = pagosM.filter(p=>(p.moneda||"ARS")==="ARS").reduce((a,p)=>a+(+p.monto_pagado||0),0);
      const cobradoUSD = pagosM.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.monto_pagado||0),0);
      const esperadoARS = pagosM.filter(p=>(p.moneda||"ARS")==="ARS").reduce((a,p)=>a+(+p.monto_esperado||0),0);
      const esperadoUSD = pagosM.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.monto_esperado||0),0);
      const sinCobrar = pagosM.filter(p=>!p.monto_pagado);

      // Cobros mes pasado — referencia
      const pagosPM = pagos.filter(p=>p.periodo===pm);
      const cobradoARSpm = pagosPM.filter(p=>(p.moneda||"ARS")==="ARS").reduce((a,p)=>a+(+p.monto_pagado||0),0);
      const cobradoUSDpm = pagosPM.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.monto_pagado||0),0);
      const hayPagosPM = pagosPM.length > 0;

      const gPend = gastos.filter(g=>g.estado==="pendiente");
      const totalGP = gPend.reduce((a,g)=>a+(+g.monto||0),0);
      const valAlq = paraAlquiler.filter(p=>p.valor_m2&&p.m2).reduce((a,p)=>a+(+p.valor_m2*+p.m2),0);
      const valProp = activas.filter(p=>p.destino==="uso_propio"&&p.valor_m2&&p.m2).reduce((a,p)=>a+(+p.valor_m2*+p.m2),0);
      const en60 = new Date(); en60.setDate(en60.getDate()+60); const en60s = en60.toISOString().slice(0,10);

      const alerts = [];
      vigentes.forEach(c=>{
        if(c.fecha_fin<=en60s){ const inq=inquilinos.find(i=>i.id===c.inquilino_id); alerts.push({type:"orange",msg:`Contrato por vencer: ${bundleLabel(c,propiedades)} (${inq?inq.nombre:""}) - ${monthLabel(c.fecha_fin.slice(0,7))}`}); }
        getHitos(c).forEach(h=>{ if(h===cm||h===addMonths(cm,-1)) alerts.push({type:"gold",msg:`Actualizacion de alquiler: ${bundleLabel(c,propiedades)} - ${monthLabel(h)}`}); });
      });
      if(sinCobrar.length>0) alerts.push({type:"red",msg:`${sinCobrar.length} pago${sinCobrar.length>1?"s":""} sin registrar en ${monthLabel(cm)}`});
      enConstr.forEach(p=>{ if(p.fecha_fin_construccion&&p.fecha_fin_construccion<=today()) alerts.push({type:"blue",msg:`Obra finalizada: ${propLabel(p)} - Marcar como activa`}); });

      const cobrosM = vigentes.map(c=>({ c, inq:inquilinos.find(i=>i.id===c.inquilino_id), pago:pagos.find(p=>p.contrato_id===c.id&&p.periodo===cm) }));
      const ac = (t) => t==="red"?["rgba(248,113,113,0.08)","rgba(248,113,113,0.2)","#f87171"]:t==="orange"?["rgba(251,146,60,0.08)","rgba(251,146,60,0.2)","#fb923c"]:t==="gold"?["rgba(201,168,76,0.08)","rgba(201,168,76,0.2)","var(--gold)"]:["rgba(96,165,250,0.08)","rgba(96,165,250,0.2)","#60a5fa"];

      // Card cobros: construye valor y sub dinámicamente por moneda
      const cobrosCardValue = () => {
        const partes = [];
        if (esperadoARS > 0 || cobradoARS > 0) partes.push(fmtARS(cobradoARS));
        if (esperadoUSD > 0 || cobradoUSD > 0) partes.push(fmtUSD(cobradoUSD));
        return partes.length > 0 ? partes.join("  ·  ") : "—";
      };
      const cobrosCardSub = () => {
        const partes = [];
        if (esperadoARS > 0) partes.push(`$ ${Number(esperadoARS).toLocaleString("es-AR")} esp.`);
        if (esperadoUSD > 0) partes.push(`USD ${Number(esperadoUSD).toLocaleString("es-AR")} esp.`);
        return partes.length > 0 ? `Esperado: ${partes.join(" · ")}` : "Sin cobros esperados";
      };
      const todosCobrado = cobradoARS >= esperadoARS && cobradoUSD >= esperadoUSD;

      return (
        <div>
          <div style={{ marginBottom:28 }}>
            <h1 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:26, fontWeight:700 }}>Dashboard</h1>
            <p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:14 }}>{monthLabel(cm)} - Resumen de tu patrimonio</p>
          </div>

          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:24 }}>
            <StatCard label="Portfolio Total" value={fmtUSD(Math.round(valAlq+valProp))} sub={`${propiedades.filter(p=>p.estado!=="archivada"&&p.valor_m2).length}/${propiedades.filter(p=>p.estado!=="archivada").length} valuadas`} icon="building"/>
            <StatCard label="Alquiladas" value={`${alquiladas.length}/${paraAlquiler.length}`} sub={`${vacantes.length} vacante${vacantes.length!==1?"s":""}`} color="#34d399" icon="home"/>

            {/* Card cobros — con desglose ARS+USD y referencia mes anterior */}
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"20px 24px", flex:"1 1 220px", minWidth:200 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Cobrado este mes</span>
                <span style={{ color: todosCobrado?"#34d399":"#fb923c", opacity:0.7 }}><Icon name="expense" size={16}/></span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:4, marginBottom:8 }}>
                {(esperadoARS>0||cobradoARS>0)&&(
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                    <span style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)", color: cobradoARS>=esperadoARS?"#34d399":"#fb923c" }}>{fmtARS(cobradoARS)}</span>
                    <span style={{ fontSize:11, color:"var(--text-muted)" }}>de {fmtARS(esperadoARS)}</span>
                  </div>
                )}
                {(esperadoUSD>0||cobradoUSD>0)&&(
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                    <span style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)", color: cobradoUSD>=esperadoUSD?"#34d399":"#fb923c" }}>{fmtUSD(cobradoUSD)}</span>
                    <span style={{ fontSize:11, color:"var(--text-muted)" }}>de {fmtUSD(esperadoUSD)}</span>
                  </div>
                )}
                {esperadoARS===0&&esperadoUSD===0&&<span style={{ fontSize:20, color:"var(--text-muted)" }}>—</span>}
              </div>
              {hayPagosPM&&(
                <div style={{ borderTop:"1px solid var(--border)", paddingTop:8, display:"flex", gap:12 }}>
                  <span style={{ fontSize:11, color:"var(--text-muted)" }}>{monthLabel(pm)}:</span>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {cobradoARSpm>0&&<span style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>{fmtARS(cobradoARSpm)}</span>}
                    {cobradoUSDpm>0&&<span style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>{fmtUSD(cobradoUSDpm)}</span>}
                    {cobradoARSpm===0&&cobradoUSDpm===0&&<span style={{ fontSize:11, color:"var(--text-muted)" }}>Sin pagos registrados</span>}
                  </div>
                </div>
              )}
            </div>

            <StatCard label="Gastos Pendientes" value={fmtARS(totalGP)} sub={`${gPend.length} gasto${gPend.length!==1?"s":""}`} color={gPend.length>0?"#f87171":"#34d399"} icon="alert"/>
          </div>
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"18px 24px", marginBottom:24 }}>
            <p style={{ margin:"0 0 14px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Desglose de Valuacion</p>
            <div style={{ display:"flex", gap:32, flexWrap:"wrap" }}>
              <div><div style={{ fontSize:20, fontWeight:700, fontFamily:"var(--font-display)", color:"var(--gold)" }}>{fmtUSD(Math.round(valAlq))}</div><div style={{ fontSize:12, color:"var(--text-muted)" }}>Propiedades en alquiler</div></div>
              <div style={{ borderLeft:"1px solid var(--border)", paddingLeft:32 }}><div style={{ fontSize:20, fontWeight:700, fontFamily:"var(--font-display)" }}>{fmtUSD(Math.round(valProp))}</div><div style={{ fontSize:12, color:"var(--text-muted)" }}>Uso propio</div></div>
              {enConstr.length>0&&<div style={{ borderLeft:"1px solid var(--border)", paddingLeft:32 }}><div style={{ fontSize:20, fontWeight:700, fontFamily:"var(--font-display)", color:"#60a5fa" }}>{enConstr.length}</div><div style={{ fontSize:12, color:"var(--text-muted)" }}>En construccion</div></div>}
            </div>
          </div>
          {alerts.length>0&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"18px 24px", marginBottom:24 }}>
            <p style={{ margin:"0 0 14px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Alertas - Accion Requerida</p>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>{alerts.map((a,i)=>{ const [bg,bdr,clr]=ac(a.type); return <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"10px 14px", borderRadius:7, background:bg, border:`1px solid ${bdr}` }}><span style={{ color:clr, flexShrink:0, marginTop:1 }}><Icon name="alert" size={14}/></span><span style={{ fontSize:13 }}>{a.msg}</span></div>; })}</div>
          </div>}
          {cobrosM.length>0&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, overflow:"hidden" }}>
            <div style={{ padding:"14px 24px", borderBottom:"1px solid var(--border)" }}><p style={{ margin:0, fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Estado de Cobros - {monthLabel(cm)}</p></div>
            {cobrosM.map(({c,inq,pago},i)=>{
              const est=!pago||!pago.monto_pagado?"pendiente":pago.monto_pagado>=pago.monto_esperado?"pagado":"parcial";
              const ids=getPropIds(c);
              return (
                <div key={c.id} onClick={()=>onNav("contratos")} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 24px", borderBottom:i<cobrosM.length-1?"1px solid var(--border)":"none", cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background="var(--surface-raised)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:14, fontWeight:600 }}>{bundleLabel(c,propiedades)}</span>
                      {ids.length>1&&<Badge label="Bundle" color="purple"/>}
                    </div>
                    <div style={{ fontSize:12, color:"var(--text-muted)" }}>{inq?inq.nombre:"—"}</div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                    <span style={{ fontSize:14, fontWeight:600 }}>{pago&&pago.monto_pagado?fmtMonto(pago.monto_pagado, pago.moneda||"ARS"):"—"}</span>
                    <Badge label={est==="pagado"?"Pagado":est==="parcial"?"Parcial":"Pendiente"} color={est==="pagado"?"green":est==="parcial"?"orange":"red"}/>
                  </div>
                </div>
              );
            })}
          </div>}
        </div>
      );
    }

    function Propiedades({ propiedades, contratos, inquilinos, onAdd, onDetail, onDelete }) {
      const [filtroEstado, setFE] = useState("todas");
      const [filtroDestino, setFD] = useState("todos");
      const [busqueda, setBusqueda] = useState("");
      const cm = currentMonth();
      const filtradas = propiedades.filter(p=>{
        if(filtroEstado==="activas"&&p.estado!=="activa") return false;
        if(filtroEstado==="construccion"&&p.estado!=="construccion") return false;
        if(filtroEstado==="archivadas"&&p.estado!=="archivada") return false;
        if(filtroDestino==="alquiler"&&p.destino!=="alquiler") return false;
        if(filtroDestino==="uso_propio"&&p.destino!=="uso_propio") return false;
        if(busqueda){ const q=busqueda.toLowerCase().replace(/[-\/\s.]/g,""); const campos=[p.direccion,p.unidad,p.piso,p.edificio,p.tipologia,p.partida_municipal,p.id_arba,p.nomenclatura_catastral].map(x=>(x||"").toLowerCase().replace(/[-\/\s.]/g,"")).join(" "); if(!campos.includes(q)) return false; }
        return true;
      });
      const fbtn = (active) => ({ padding:"6px 14px", borderRadius:20, border:`1px solid ${active?"var(--gold)":"var(--border)"}`, background:active?"rgba(201,168,76,0.12)":"none", color:active?"var(--gold)":"var(--text-muted)", cursor:"pointer", fontSize:13, fontWeight:active?700:400 });
      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
            <div><h1 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:26, fontWeight:700 }}>Propiedades</h1><p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:14 }}>{propiedades.filter(p=>p.estado!=="archivada").length} propiedades activas</p></div>
            <button onClick={onAdd} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 18px", borderRadius:7, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:14, fontWeight:700 }}><Icon name="plus" size={16}/>Nueva Propiedad</button>
          </div>
          <div style={{ position:"relative", marginBottom:16 }}>
            <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"var(--text-muted)", pointerEvents:"none" }}><Icon name="search" size={16}/></span>
            <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="Buscar por direccion, partida municipal, ID ARBA, nomenclatura catastral..." style={{ ...iStyle, paddingLeft:38 }}/>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
            {[["todas","Todas"],["activas","Activas"],["construccion","En Construccion"],["archivadas","Archivadas"]].map(([v,l])=><button key={v} onClick={()=>setFE(v)} style={fbtn(filtroEstado===v)}>{l}</button>)}
            <div style={{ width:1, background:"var(--border)", margin:"0 4px" }}/>
            {[["todos","Todos"],["alquiler","Alquiler"],["uso_propio","Uso Propio"]].map(([v,l])=><button key={v} onClick={()=>setFD(v)} style={fbtn(filtroDestino===v)}>{l}</button>)}
          </div>
          {filtradas.length===0?<div style={{ textAlign:"center", padding:"60px", color:"var(--text-muted)" }}><p>No se encontraron propiedades</p><button onClick={onAdd} style={{ padding:"9px 18px", borderRadius:7, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:14, fontWeight:700, marginTop:12 }}>Agregar propiedad</button></div>:(
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {filtradas.map(p=>{
                const c = contratos.find(c=>getPropIds(c).includes(p.id)&&c.fecha_fin>=cm+"-01");
                const inq = c?inquilinos.find(i=>i.id===c.inquilino_id):null;
                const val = p.valor_m2&&p.m2?Math.round(+p.valor_m2*+p.m2):null;
                const eKey = p.estado==="activa"&&p.destino==="alquiler"&&c?"alquilada":p.estado==="activa"&&p.destino==="alquiler"&&!c?"vacante":p.estado==="activa"&&p.destino==="uso_propio"?"uso_propio":p.estado==="construccion"?"construccion":"archivada";
                const bm = { alquilada:["Alquilada","green"], vacante:["Vacante","orange"], uso_propio:["Uso Propio","blue"], construccion:["En Construccion","blue"], archivada:["Archivada","muted"] };
                return (
                  <div key={p.id} onClick={()=>onDetail(p.id)} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"16px 20px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16 }} onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.background="var(--surface-raised)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)";}}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5, flexWrap:"wrap" }}>
                        <span style={{ fontSize:15, fontWeight:700 }}>{propLabel(p)}</span>
                        <Badge label={bm[eKey][0]} color={bm[eKey][1]}/>
                        {c&&<BundleTag contrato={c} propiedades={propiedades} currentPropId={p.id}/>}
                      </div>
                      <div style={{ fontSize:12, color:"var(--text-muted)" }}>{p.tipologia}{p.m2?` - ${p.m2} m2`:""}{p.edificio?` - ${p.edificio}`:""}{inq?` - ${inq.nombre}`:""}</div>
                    </div>
                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      {val?<div style={{ fontSize:15, fontWeight:700, color:"var(--gold)" }}>{fmtUSD(val)}</div>:<div style={{ fontSize:12, color:"var(--text-muted)" }}>Sin valuacion</div>}
                      {c&&<div style={{ fontSize:12, color:"var(--text-muted)" }}>{fmtMonto(c.monto_inicial, c.moneda_cuota||"ARS")}/mes{isBundle(c)?" (bundle)":""}</div>}
                      {p.estado==="construccion"&&p.fecha_fin_construccion&&<div style={{ fontSize:12, color:"#60a5fa" }}>Fin: {p.fecha_fin_construccion}</div>}
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:4, flexShrink:0 }}>
                      <span style={{ color:"var(--text-muted)" }}><Icon name="chevron" size={16}/></span>
                      <button onClick={(e)=>{ e.stopPropagation(); onDelete(p.id); }} style={{ background:"none", border:"none", cursor:"pointer", color:"rgba(248,113,113,0.5)", display:"flex", padding:2 }} title="Borrar"><Icon name="trash" size={13}/></button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function DetallePropiedad({ propiedad:p, contratos, pagos, gastos, inquilinos, propiedades, onEdit, onBack, onAddGasto, onAddContrato, onAddPago, onEditContrato, onDeleteContrato }) {
      const [tab, setTab] = useState("info");
      const cm = currentMonth();
      const ca = contratos.find(c=>getPropIds(c).includes(p.id)&&c.fecha_fin>=cm+"-01");
      const hC = contratos.filter(c=>getPropIds(c).includes(p.id));
      const gP = gastos.filter(g=>g.propiedad_id===p.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
      const inqA = ca?inquilinos.find(i=>i.id===ca.inquilino_id):null;
      const val = p.valor_m2&&p.m2?Math.round(+p.valor_m2*+p.m2):null;
      const gan = p.valor_venta&&p.valor_compra?Math.round(+p.valor_venta-+p.valor_compra):null;
      const tbtn = (k) => ({ padding:"10px 16px", background:"none", border:"none", cursor:"pointer", fontSize:13, fontWeight:tab===k?700:400, color:tab===k?"var(--gold)":"var(--text-muted)", borderBottom:tab===k?"2px solid var(--gold)":"2px solid transparent", marginBottom:-1 });
      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <button onClick={onBack} style={{ background:"none", border:"1px solid var(--border)", borderRadius:6, padding:"6px 10px", cursor:"pointer", color:"var(--text-muted)", display:"flex" }}><Icon name="back" size={16}/></button>
            <div style={{ flex:1 }}>
              <h1 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:22, fontWeight:700 }}>{propLabel(p)}</h1>
              <div style={{ margin:"2px 0 0", color:"var(--text-muted)", fontSize:13 }}>{p.tipologia}{p.edificio?` - ${p.edificio}`:""}</div>
            </div>
            <button onClick={()=>onEdit(p)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", borderRadius:6, border:"1px solid var(--border)", background:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:13 }}><Icon name="edit" size={14}/>Editar</button>
          </div>
          <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
            {val&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"12px 18px", flex:"1 1 160px" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Valuacion estimada</div><div style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)", color:"var(--gold)" }}>{fmtUSD(val)}</div><div style={{ fontSize:11, color:"var(--text-muted)" }}>{fmtUSD(p.valor_m2)}/m2 - {p.m2} m2</div></div>}
            {p.valor_compra&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"12px 18px", flex:"1 1 160px" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Valor de compra</div><div style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)" }}>{fmtUSD(p.valor_compra)}</div>{p.fecha_compra&&<div style={{ fontSize:11, color:"var(--text-muted)" }}>{p.fecha_compra}</div>}</div>}
            {p.estado==="archivada"&&p.valor_venta&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"12px 18px", flex:"1 1 160px" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Vendida</div><div style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)" }}>{fmtUSD(p.valor_venta)}</div>{gan!=null&&<div style={{ fontSize:11, color:gan>=0?"#34d399":"#f87171" }}>{gan>=0?"+":""}{fmtUSD(gan)} vs compra</div>}</div>}
            {ca&&<div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"12px 18px", flex:"1 1 160px" }}>
              <div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Contrato vigente</div>
              <div style={{ fontSize:22, fontWeight:700, fontFamily:"var(--font-display)", color:"#34d399" }}>{fmtMonto(ca.monto_inicial, ca.moneda_cuota||"ARS")}</div>
              <div style={{ fontSize:11, color:"var(--text-muted)" }}>{inqA?inqA.nombre:""}{isBundle(ca)?" · Bundle":""}</div>
            </div>}
          </div>
          <div style={{ display:"flex", gap:4, marginBottom:20, borderBottom:"1px solid var(--border)" }}>
            {[["info","Informacion"],["contratos","Contratos"],["gastos","Gastos"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={tbtn(k)}>{l}</button>)}
          </div>
          {tab==="info"&&(
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
                {[["Tipo",p.tipo],["Tipologia",p.tipologia],["Direccion",p.direccion],["Piso",p.piso||"—"],["Unidad",p.unidad||"—"],["Edificio",p.edificio||"—"],["Superficie",p.m2?`${p.m2} m2`:"—"],["Destino",p.destino==="alquiler"?"Alquiler":"Uso Propio"]].map(([k,v])=>(
                  <div key={k} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:7, padding:"12px 16px" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:3 }}>{k}</div><div style={{ fontSize:14 }}>{v||"—"}</div></div>
                ))}
              </div>
              <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:16 }}>
                <p style={{ margin:"0 0 12px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Identificadores Fiscales</p>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  {[["Partida Municipal",p.partida_municipal],["ID ARBA",p.id_arba],["Nomenclatura Catastral",p.nomenclatura_catastral]].map(([k,v])=>(
                    <div key={k}><div style={{ fontSize:11, color:"var(--text-muted)", marginBottom:4 }}>{k}</div><div style={{ fontSize:13, fontFamily:"monospace", background:"var(--surface-raised)", padding:"4px 8px", borderRadius:4, display:"inline-block" }}>{v||"—"}</div></div>
                  ))}
                </div>
              </div>
              {p.notas&&<div style={{ marginTop:12, background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:16 }}><p style={{ margin:"0 0 6px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-muted)" }}>Notas</p><p style={{ margin:0, fontSize:14, lineHeight:1.6 }}>{p.notas}</p></div>}
            </div>
          )}
          {tab==="contratos"&&(
            <div>
              {hC.length===0?<div style={{ textAlign:"center", padding:"40px", color:"var(--text-muted)" }}>Sin contratos registrados</div>:(
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {hC.sort((a,b)=>b.fecha_inicio.localeCompare(a.fecha_inicio)).map(c=>{
                    const inq=inquilinos.find(i=>i.id===c.inquilino_id);
                    const vig=c.fecha_fin>=cm+"-01";
                    const hitos=getHitos(c);
                    const bundle=isBundle(c);
                    const otherProps=getPropIds(c).filter(id=>id!==p.id).map(id=>propiedades.find(x=>x.id===id)).filter(Boolean);
                    return (
                      <div key={c.id} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:9, padding:"16px 20px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                          <div>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                              <span style={{ fontSize:14, fontWeight:700 }}>{inq?inq.nombre:"—"}</span>
                              {bundle&&<Badge label="Bundle" color="purple"/>}
                            </div>
                            <div style={{ fontSize:12, color:"var(--text-muted)" }}>{c.fecha_inicio} al {c.fecha_fin}</div>
                          </div>
                          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                            <Badge label={vig?"Vigente":"Finalizado"} color={vig?"green":"muted"}/>
                            <button onClick={()=>onEditContrato(c)} style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:5, border:"1px solid var(--border)", background:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:11, fontWeight:600 }}><Icon name="edit" size={11}/>Editar</button>
                            <button onClick={()=>onDeleteContrato(c.id)} style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:5, border:"1px solid rgba(248,113,113,0.3)", background:"none", color:"#f87171", cursor:"pointer", fontSize:11, fontWeight:600 }}><Icon name="trash" size={11}/>Borrar</button>
                          </div>
                        </div>
                        {bundle&&otherProps.length>0&&(
                          <div style={{ marginBottom:10, padding:"8px 12px", borderRadius:6, background:"rgba(167,139,250,0.08)", border:"1px solid rgba(167,139,250,0.2)", fontSize:12, color:"#a78bfa", display:"flex", alignItems:"center", gap:6 }}>
                            <Icon name="link" size={13}/>
                            Alquilado junto con: {otherProps.map(op=>propLabel(op)).join(", ")}
                          </div>
                        )}
                        <div style={{ display:"flex", gap:16, fontSize:13, color:"var(--text-muted)", marginBottom:12, flexWrap:"wrap" }}>
                          <span>Cuota: <strong style={{color:"var(--text)"}}>{fmtMonto(c.monto_inicial, c.moneda_cuota||"ARS")}</strong></span>
                          <span>Deposito: <strong style={{color:"var(--text)"}}>{fmtMonto(c.deposito, c.moneda_deposito||"ARS")}</strong></span>
                          <span>Indice: <strong style={{color:"var(--text)"}}>{c.indice}</strong> c/{c.periodicidad_meses}m</span>
                        </div>
                        {hitos.length>0&&(
                          <div>
                            <p style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"var(--text-muted)", margin:"0 0 8px" }}>Hitos de Actualizacion</p>
                            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                              {hitos.map(h=>{ const ea=h===cm,ep=h<cm; return <span key={h} style={{ padding:"4px 10px", borderRadius:4, fontSize:12, background:ea?"rgba(201,168,76,0.15)":ep?"var(--surface-raised)":"rgba(96,165,250,0.1)", color:ea?"var(--gold)":ep?"var(--text-muted)":"#60a5fa", border:`1px solid ${ea?"rgba(201,168,76,0.3)":ep?"var(--border)":"rgba(96,165,250,0.25)"}`, fontWeight:ea?700:400 }}>{monthLabel(h)}{ea?" *":""}</span>; })}
                            </div>
                          </div>
                        )}
                        {vig&&<div style={{ display:"flex", gap:8, marginTop:12 }}>
                          <button onClick={()=>onAddPago(c)} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 14px", borderRadius:6, border:"1px solid var(--border)", background:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:13 }}><Icon name="plus" size={13}/>Registrar pago</button>
                          {c.adjunto&&<button onClick={()=>window.open(c.adjunto,"_blank")} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 14px", borderRadius:6, border:"1px solid rgba(96,165,250,0.3)", background:"rgba(96,165,250,0.06)", color:"#60a5fa", cursor:"pointer", fontSize:13 }}><Icon name="upload" size={13}/>Ver adjunto</button>}
                        </div>}
                      </div>
                    );
                  })}
                </div>
              )}
              {p.estado==="activa"&&p.destino==="alquiler"&&<button onClick={onAddContrato} style={{ marginTop:12, display:"flex", alignItems:"center", gap:6, padding:"9px 18px", borderRadius:7, border:"1px dashed var(--border)", background:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:14 }}><Icon name="plus" size={14}/>Nuevo contrato</button>}
            </div>
          )}
          {tab==="gastos"&&(
            <div>
              <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
                <button onClick={onAddGasto} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 16px", borderRadius:6, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:13, fontWeight:700 }}><Icon name="plus" size={14}/>Registrar Gasto</button>
              </div>
              {gP.length===0?<div style={{ textAlign:"center", padding:"40px", color:"var(--text-muted)" }}>Sin gastos registrados</div>:(
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {gP.map(g=>(
                    <div key={g.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"12px 16px" }}>

    function Contratos({ contratos, propiedades, inquilinos, pagos, onAdd, onAddPago, onEditContrato, onDeleteContrato }) {

            <button onClick={onAdd} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 18px", borderRadius:7, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:14, fontWeight:700 }}><Icon name="plus" size={16}/>Nuevo Contrato</button>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
            {[["vigentes","Vigentes"],["por_vencer","Por Vencer (60 dias)"],["finalizados","Finalizados"],["todos","Todos"]].map(([v,l])=><button key={v} onClick={()=>setFiltro(v)} style={fbtn(filtro===v)}>{l}</button>)}
          </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {filtrados.map(c=>{

                      <div style={{ flex:1 }}>

                          <span style={{ fontSize:15, fontWeight:700 }}>{bundleLabel(c,propiedades)}</span>

                        <div style={{ fontSize:14, fontWeight:600 }}>{g.tipo}</div>

                        <span style={{ fontSize:15, fontWeight:700 }}>{fmtARS(g.monto)}</span>

    function Buscador({ propiedades, onSelect }) {
      const [q, setQ] = useState("");
      const resultados = useMemo(()=>{ if(!q||q.length<2) return []; const norm=q.toLowerCase().replace(/[-\/\s.]/g,""); return propiedades.filter(p=>{ const campos=[p.direccion,p.unidad,p.piso,p.edificio,p.partida_municipal,p.id_arba,p.nomenclatura_catastral,p.tipologia].map(x=>(x||"").toLowerCase().replace(/[-\/\s.]/g,"")).join("|"); return campos.includes(norm); }); },[q,propiedades]);
      return (
        <div>
          <div style={{ marginBottom:28 }}><h1 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:26, fontWeight:700 }}>Buscador de Propiedades</h1><p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:14 }}>Identificar a que propiedad corresponde una boleta o identificador fiscal</p></div>
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"24px", marginBottom:20 }}>
            <p style={{ margin:"0 0 12px", fontSize:13, color:"var(--text-muted)" }}>El sistema ignora guiones, barras y espacios - ingresa el numero como aparece en la boleta</p>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"var(--gold)", pointerEvents:"none" }}><Icon name="search" size={20}/></span>
              <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Ej: 099-12345/6 o ARB-2024-00123 o 01-23-456-7890" style={{ ...iStyle, paddingLeft:46, fontSize:16, border:"2px solid var(--gold)" }}/>
            </div>
          </div>
          {q.length>=2&&(resultados.length===0?<div style={{ textAlign:"center", padding:"40px", color:"var(--text-muted)" }}><p style={{ fontSize:15 }}>No se encontro ninguna propiedad con ese identificador</p><p style={{ fontSize:13, marginTop:8 }}>Verificar que el dato catastral este cargado en la ficha</p></div>:(
            <div>
              <p style={{ fontSize:12, color:"var(--text-muted)", marginBottom:12 }}>{resultados.length} resultado{resultados.length>1?"s":""} encontrado{resultados.length>1?"s":""}</p>
              {resultados.map(p=>(
                <div key={p.id} onClick={()=>onSelect(p.id)} style={{ background:"var(--surface)", border:"2px solid var(--gold)", borderRadius:10, padding:"18px 22px", cursor:"pointer", marginBottom:10 }} onMouseEnter={e=>e.currentTarget.style.background="var(--surface-raised)"} onMouseLeave={e=>e.currentTarget.style.background="var(--surface)"}>
                  <div style={{ fontSize:16, fontWeight:700, marginBottom:10 }}>{propLabel(p)}</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:12 }}>
                    {p.partida_municipal&&<div><div style={{ fontSize:11, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:2 }}>Partida Municipal</div><div style={{ fontSize:13, fontFamily:"monospace", color:"var(--gold)" }}>{p.partida_municipal}</div></div>}
                    {p.id_arba&&<div><div style={{ fontSize:11, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:2 }}>ID ARBA</div><div style={{ fontSize:13, fontFamily:"monospace", color:"var(--gold)" }}>{p.id_arba}</div></div>}
                    {p.nomenclatura_catastral&&<div><div style={{ fontSize:11, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:2 }}>Nomenclatura Catastral</div><div style={{ fontSize:13, fontFamily:"monospace", color:"var(--gold)" }}>{p.nomenclatura_catastral}</div></div>}
                  </div>
                  <div style={{ marginTop:10, fontSize:13, color:"var(--text-muted)" }}>Ver ficha completa</div>
                </div>
              ))}
            </div>
          ))}
          {!q&&<div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))", gap:10, opacity:0.5 }}>{["Partida Municipal","ID ARBA","Nomenclatura Catastral","Direccion","Numero de Unidad"].map(t=><div key={t} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:7, padding:"12px 16px" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em" }}>Podes buscar por</div><div style={{ fontSize:13, marginTop:4 }}>{t}</div></div>)}</div>}
        </div>
      );
    }

    // ── ROOT ───────────────────────────────────────────────────────────────────
    function App() {
      const [authState, setAuthState] = useState("checking");
      const [syncMsg, setSyncMsg] = useState("");
      const [propiedades, setP] = useState(()=>loadLocal(KEYS.propiedades));
      const [inquilinos, setI] = useState(()=>loadLocal(KEYS.inquilinos));
      const [contratos, setC] = useState(()=>loadLocal(KEYS.contratos));
      const [pagos, setPg] = useState(()=>loadLocal(KEYS.pagos));
      const [gastos, setG] = useState(()=>loadLocal(KEYS.gastos));
      const [nav, setNav] = useState("dashboard");
      const [detId, setDetId] = useState(null);
      const [modal, setModal] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        if (isTokenValid()) doSync();
        else setAuthState("loggedout");
      }, []);

      const doSync = async () => {
        setAuthState("syncing"); setSyncMsg("Sincronizando con Google Sheets...");
        try {
          const data = await syncAll();
          setP(data.propiedades); setI(data.inquilinos); setC(data.contratos); setPg(data.pagos); setG(data.gastos);
          setAuthState("ready");
        } catch(e) {
          console.error(e);
          if (String(e.message).includes("401")) { clearToken(); setAuthState("loggedout"); }
          else { setAuthState("error"); setSyncMsg(e.message); }
        }
      };

      const handleLogin = async () => {
        setAuthState("syncing"); setSyncMsg("Iniciando sesion con Google...");
        try { await getToken(); await doSync(); }
        catch(e) { setAuthState("loggedout"); alert("Error al iniciar sesion: " + e.message); }
      };

      const saveToSheets = async (sheetName, obj) => {
        setSaving(true);
        try {
          const processed = await processImages(obj, sheetName.toLowerCase());
          await sheetsSave(sheetName, processed);
          return processed;
        } finally { setSaving(false); }
      };

      const saveProp = async (f) => {
        const item = f.id ? f : {...f, id:uid()};
        const saved = await saveToSheets("Propiedades", item);
        const next = propiedades.find(p=>p.id===saved.id) ? propiedades.map(p=>p.id===saved.id?saved:p) : [...propiedades,saved];
        saveLocal(KEYS.propiedades,next); setP(next); setModal(null);
      };
      const saveInq = async (f) => {
        const item = f.id ? f : {...f, id:uid()};
        const saved = await saveToSheets("Inquilinos", item);
        const next = inquilinos.find(i=>i.id===saved.id) ? inquilinos.map(i=>i.id===saved.id?saved:i) : [...inquilinos,saved];
        saveLocal(KEYS.inquilinos,next); setI(next); setModal(null);
      };
      const saveCon = async (f) => {
        const item = f.id ? f : {...f, id:uid()};
        const saved = await saveToSheets("Contratos", item);
        const next = contratos.find(c=>c.id===saved.id) ? contratos.map(c=>c.id===saved.id?saved:c) : [...contratos,saved];
        saveLocal(KEYS.contratos,next); setC(next); setModal(null);
      };
      const savePago = async (f) => {
        const item = {...f, id:uid()};
        const saved = await saveToSheets("Pagos", item);
        const next = [...pagos, saved];
        saveLocal(KEYS.pagos,next); setPg(next); setModal(null);
      };
      const saveGasto = async (f) => {
        const item = f.id ? f : {...f, id:uid()};
        const saved = await saveToSheets("Gastos", item);
        const next = gastos.find(g=>g.id===saved.id) ? gastos.map(g=>g.id===saved.id?saved:g) : [...gastos,saved];
        saveLocal(KEYS.gastos,next); setG(next); setModal(null);
      };
      const toggleGasto = async (id) => {
        const g = gastos.find(x=>x.id===id); if(!g) return;
        const updated = {...g, estado: g.estado==="pagado"?"pendiente":"pagado"};
        await saveToSheets("Gastos", updated);
        const next = gastos.map(x=>x.id===id?updated:x);
        saveLocal(KEYS.gastos,next); setG(next);
      };

      const deleteProp = async (id) => {
        if (!window.confirm("Borrar esta propiedad? Esta accion no se puede deshacer.")) return;
        const next = propiedades.filter(p=>p.id!==id);
        saveLocal(KEYS.propiedades,next); setP(next);
        // También borrar del Sheet marcando como eliminado es complejo, por ahora solo local
        // TODO: implementar borrado en Sheets
      };
      const deleteInq = async (id) => {
        if (!window.confirm("Borrar este inquilino?")) return;
        const next = inquilinos.filter(i=>i.id!==id);
        saveLocal(KEYS.inquilinos,next); setI(next);
      };
      const deleteCon = async (id) => {
        if (!window.confirm("Borrar este contrato?")) return;
        const next = contratos.filter(c=>c.id!==id);
        saveLocal(KEYS.contratos,next); setC(next);
      };
      const detProp = detId ? propiedades.find(p=>p.id===detId) : null;
      const navItems = [["dashboard","Dashboard","dashboard"],["propiedades","Propiedades","building"],["contratos","Contratos","contract"],["gastos","Gastos","expense"],["inquilinos","Inquilinos","person"],["buscador","Buscador","search"]];
      const sbtn = (active) => ({ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"10px 12px", borderRadius:7, border:"none", background:active?"rgba(201,168,76,0.12)":"none", color:active?"var(--gold)":"var(--text-muted)", cursor:"pointer", fontSize:14, fontWeight:active?600:400, marginBottom:2, textAlign:"left" });

      if (authState==="checking"||authState==="syncing") return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
          <div style={{ width:40, height:40, border:"3px solid var(--border)", borderTop:"3px solid var(--gold)", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>
          <p style={{ color:"var(--text-muted)", fontSize:14 }}>{syncMsg||"Cargando..."}</p>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );

      if (authState==="loggedout") return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:16, padding:"48px 40px", textAlign:"center", maxWidth:400, width:"100%" }}>
            <div style={{ fontSize:32, fontFamily:"var(--font-display)", fontWeight:800, color:"var(--gold)", marginBottom:8 }}>Patrimonio</div>
            <div style={{ fontSize:12, color:"var(--text-muted)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:32 }}>Gestion Inmobiliaria</div>
            <p style={{ fontSize:14, color:"var(--text-muted)", marginBottom:28, lineHeight:1.6 }}>Tus datos se guardan de forma segura en tu Google Drive y Google Sheets personal.</p>
            <button onClick={handleLogin} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, width:"100%", padding:"13px 20px", borderRadius:8, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:15, fontWeight:700 }}>
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#0a0a0a" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#0a0a0a" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#0a0a0a" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#0a0a0a" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continuar con Google
            </button>
          </div>
        </div>
      );

      if (authState==="error") return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
          <p style={{ color:"#f87171", fontSize:15 }}>Error al conectar: {syncMsg}</p>
          <button onClick={handleLogin} style={{ padding:"9px 20px", borderRadius:7, border:"none", background:"var(--gold)", color:"#0a0a0a", cursor:"pointer", fontSize:14, fontWeight:700 }}>Reintentar</button>
        </div>
      );

      return (
        <div style={{ display:"flex", minHeight:"100vh" }}>
          {saving&&<div style={{ position:"fixed", top:0, left:0, right:0, height:3, background:"var(--gold)", zIndex:2000, animation:"pulse 1s ease-in-out infinite" }}/>}
          <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
          <aside style={{ width:220, background:"var(--surface)", borderRight:"1px solid var(--border)", display:"flex", flexDirection:"column", padding:"24px 0", flexShrink:0, position:"sticky", top:0, height:"100vh" }}>
            <div style={{ padding:"0 20px 24px", borderBottom:"1px solid var(--border)" }}>
              <div style={{ fontSize:18, fontFamily:"var(--font-display)", fontWeight:700, color:"var(--gold)", letterSpacing:"0.02em" }}>Patrimonio</div>
              <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:2, letterSpacing:"0.05em", textTransform:"uppercase" }}>Gestion Inmobiliaria</div>
            </div>
            <nav style={{ padding:"16px 12px", flex:1 }}>
              {navItems.map(([id,label,icon])=>(
                <button key={id} onClick={()=>{ setNav(id); if(id!=="propiedades") setDetId(null); }} style={sbtn(nav===id)}>
                  <Icon name={icon} size={17}/>{label}
                </button>
              ))}
            </nav>
            <div style={{ padding:"16px 20px", borderTop:"1px solid var(--border)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:"#34d399" }}/>
                <div style={{ fontSize:11, color:"var(--text-muted)" }}>Conectado a Google</div>
              </div>
              <button onClick={doSync} style={{ width:"100%", padding:"7px 10px", borderRadius:6, border:"1px solid var(--border)", background:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:11, fontWeight:600, marginBottom:6 }}>Sincronizar</button>
              <button onClick={()=>{ clearToken(); setAuthState("loggedout"); }} style={{ width:"100%", padding:"7px 10px", borderRadius:6, border:"1px solid rgba(248,113,113,0.3)", background:"rgba(248,113,113,0.06)", color:"#f87171", cursor:"pointer", fontSize:11, fontWeight:600 }}>Cerrar sesion</button>
            </div>
          </aside>
          <main style={{ flex:1, padding:"32px 36px", overflowY:"auto", maxWidth:900 }}>
            {nav==="dashboard"&&<Dashboard propiedades={propiedades} contratos={contratos} pagos={pagos} gastos={gastos} inquilinos={inquilinos} onNav={(s)=>setNav(s)}/>}
            {nav==="propiedades"&&!detProp&&<Propiedades propiedades={propiedades} contratos={contratos} inquilinos={inquilinos} onAdd={()=>setModal({type:"prop"})} onEdit={(p)=>setModal({type:"prop",data:p})} onDetail={(id)=>setDetId(id)} onDelete={deleteProp}/>}
            {nav==="propiedades"&&detProp&&<DetallePropiedad propiedad={detProp} contratos={contratos} pagos={pagos} gastos={gastos} inquilinos={inquilinos} propiedades={propiedades} onEdit={(p)=>setModal({type:"prop",data:p})} onBack={()=>setDetId(null)} onAddGasto={()=>setModal({type:"gasto",data:{propiedad_id:detProp.id}})} onAddContrato={()=>setModal({type:"contrato",data:{propiedad_ids:[detProp.id]}})} onAddPago={(c)=>setModal({type:"pago",contrato:c,data:{contrato_id:c.id}})} onEditContrato={(c)=>setModal({type:"contrato",data:c})} onDeleteContrato={deleteCon}/>}
            {nav==="contratos"&&<Contratos contratos={contratos} propiedades={propiedades} inquilinos={inquilinos} pagos={pagos} onAdd={()=>setModal({type:"contrato"})} onAddPago={(c)=>setModal({type:"pago",contrato:c,data:{contrato_id:c.id}})} onEditContrato={(c)=>setModal({type:"contrato",data:c})} onDeleteContrato={deleteCon}/>}
            {nav==="gastos"&&<Gastos gastos={gastos} propiedades={propiedades} onAdd={()=>setModal({type:"gasto"})} onToggleEstado={toggleGasto}/>}
            {nav==="inquilinos"&&<Inquilinos inquilinos={inquilinos} contratos={contratos} propiedades={propiedades} onAdd={()=>setModal({type:"inq"})} onEdit={(i)=>setModal({type:"inq",data:i})} onDelete={deleteInq}/>}
            {nav==="buscador"&&<Buscador propiedades={propiedades} onSelect={(id)=>{ setDetId(id); setNav("propiedades"); }}/>}
          </main>
          {modal?.type==="prop"&&<Modal title={modal.data?"Editar Propiedad":"Nueva Propiedad"} onClose={()=>setModal(null)} wide><PropiedadForm initial={modal.data||{}} onSave={saveProp} onClose={()=>setModal(null)}/></Modal>}
          {modal?.type==="inq"&&<Modal title={modal.data?"Editar Inquilino":"Nuevo Inquilino"} onClose={()=>setModal(null)}><InquilinoForm initial={modal.data||{}} onSave={saveInq} onClose={()=>setModal(null)}/></Modal>}
          {modal?.type==="contrato"&&<Modal title={modal.data?.id?"Editar Contrato":"Nuevo Contrato"} onClose={()=>setModal(null)} wide><ContratoForm initial={modal.data||{}} propiedades={propiedades} inquilinos={inquilinos} onSave={saveCon} onClose={()=>setModal(null)}/></Modal>}
          {modal?.type==="pago"&&<Modal title="Registrar Pago" onClose={()=>setModal(null)}><PagoForm initial={modal.data||{}} contrato={modal.contrato||{}} onSave={savePago} onClose={()=>setModal(null)}/></Modal>}
          {modal?.type==="gasto"&&<Modal title="Registrar Gasto" onClose={()=>setModal(null)}><GastoForm initial={modal.data||{}} propiedades={propiedades} onSave={saveGasto} onClose={()=>setModal(null)}/></Modal>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
